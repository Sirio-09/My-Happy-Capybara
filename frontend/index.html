<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Happy Capybara</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header class="app-header">
        <div class="header-logo">My Happy Capybara</div>
        <div class="user-info">
            <span id="nome-utente">Utente</span>
            <button onclick="logout()" id="button-logout">Logout</button>
        </div>
    </header>

    <h1>My Happy Capybara</h1>
    <h2>Complete your Tasks and cheer up your Capybara</h2>

    <div class="input-section">
        <label for="input-checkbox" id="input-label">Insert your Tasks (Time is mandatory):</label>
        <div class="input-row">
            <input type="text" id="input-checkbox" placeholder="Write a task...">
            <div class="time-wrapper">
                <span class="time-icon">By</span>
                <select id="input-ore" class="time-select">
                    <option value="">--</option>
                    <option value="00">00</option>
                    <option value="01">01</option>
                    <option value="02">02</option>
                    <option value="03">03</option>
                    <option value="04">04</option>
                    <option value="05">05</option>
                    <option value="06">06</option>
                    <option value="07">07</option>
                    <option value="08">08</option>
                    <option value="09">09</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                    <option value="13">13</option>
                    <option value="14">14</option>
                    <option value="15">15</option>
                    <option value="16">16</option>
                    <option value="17">17</option>
                    <option value="18">18</option>
                    <option value="19">19</option>
                    <option value="20">20</option>
                    <option value="21">21</option>
                    <option value="22">22</option>
                    <option value="23">23</option>
                </select>
                <span class="time-sep">:</span>
                <select id="input-minuti" class="time-select">
                    <option value="">--</option>
                    <option value="00">00</option>
                    <option value="05">05</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="25">25</option>
                    <option value="30">30</option>
                    <option value="35">35</option>
                    <option value="40">40</option>
                    <option value="45">45</option>
                    <option value="50">50</option>
                    <option value="55">55</option>
                </select>
            </div>
            <button onclick="insertCheckBox()" id="button-insert">INSERT</button>
        </div>
    </div>

    <div class="main-layout">
        <div id="container-checkbox">
            <p>To Do List</p>
            <hr>
            <div id="div-checkbox"></div>
        </div>

        <div class="progress-panel">
            <div class="capybara-container">
                <svg id="capybara-svg" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="100" cy="110" rx="65" ry="40" fill="#C4956A"/>
                    <ellipse cx="100" cy="72" rx="45" ry="38" fill="#C4956A"/>
                    <ellipse cx="68" cy="42" rx="14" ry="10" fill="#C4956A"/>
                    <ellipse cx="132" cy="42" rx="14" ry="10" fill="#C4956A"/>
                    <ellipse cx="68" cy="42" rx="8" ry="6" fill="#E8B98A"/>
                    <ellipse cx="132" cy="42" rx="8" ry="6" fill="#E8B98A"/>
                    <ellipse cx="100" cy="82" rx="22" ry="16" fill="#B8845A"/>
                    <ellipse cx="100" cy="76" rx="7" ry="5" fill="#8B5A3A"/>
                    <circle cx="97" cy="76" r="2" fill="#6B3A1A"/>
                    <circle cx="103" cy="76" r="2" fill="#6B3A1A"/>
                    <circle cx="84" cy="65" r="8" fill="#3A2010"/>
                    <circle cx="116" cy="65" r="8" fill="#3A2010"/>
                    <circle cx="86" cy="63" r="3" fill="white"/>
                    <circle cx="118" cy="63" r="3" fill="white"/>
                    <g id="capybara-mouth"></g>
                    <circle id="guancia-sx" cx="72" cy="78" r="10" fill="#EC407A" opacity="0"/>
                    <circle id="guancia-dx" cx="128" cy="78" r="10" fill="#EC407A" opacity="0"/>
                    <ellipse cx="70" cy="143" rx="18" ry="10" fill="#C4956A"/>
                    <ellipse cx="130" cy="143" rx="18" ry="10" fill="#C4956A"/>
                    <ellipse cx="70" cy="143" rx="14" ry="7" fill="#B8845A"/>
                    <ellipse cx="130" cy="143" rx="14" ry="7" fill="#B8845A"/>
                    <ellipse cx="163" cy="100" rx="10" ry="7" fill="#B8845A"/>
                </svg>
            </div>

            <div class="progress-info">
                <span class="progress-percentage" id="progress-percentage">0%</span>
                <span class="progress-count" id="progress-count">0 / 0 completed</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-bar-fill"></div>
            </div>
        </div>
    </div>

    <div class="delete-section">
        <button onclick="removeCheckbox()" id="button-remove">DELETE COMPLETED</button>
    </div>
</body>
</html>
