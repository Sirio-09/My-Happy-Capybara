<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Happy Capybara</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header id="header">
        <div class="header-left">
            <h1>My Happy Capybara</h1>
        </div>
        <div class="header-right">
            <span id="nome-utente">Utente</span>
            <button onclick="logout()" class="logout-btn">Esci</button>
        </div>
    </header>

    <main>
        <h2>Completa le tue task e rendi felice il tuo capybara</h2>

        <div class="input-section">
            <label for="input-checkbox" id="input-label">Aggiungi una task: </label>
            <input type="text" id="input-checkbox" placeholder="Scrivi una task...">
            <button onclick="insertCheckBox()" id="button-insert">AGGIUNGI</button>
        </div>

        <div id="container-checkbox">
            <p>Le Tue Task</p>
            <hr>
            <div id="div-checkbox"></div>
        </div>

        <button onclick="removeCheckbox()" class="delete-btn">Elimina Task Completate</button>
    </main>
</body>
</html>
