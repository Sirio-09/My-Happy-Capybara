<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione</title>
    <style>
        body {
            background-color: #FFF5F7;
            font-family: Georgia, 'Times New Roman', Times, serif;
            text-align: center;
            color: #880E4F;
            user-select: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            border: 1px solid rgba(174, 22, 83, 0.2);
            width: 400px;
            max-width: 90%;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(136, 14, 79, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #fff;
        }
        h1 { margin-top: 0; margin-bottom: 10px; font-size: 30px; letter-spacing: 0.5px; }
        input[type="text"], input[type="email"], input[type="password"] {
            font-family: inherit;
            font-size: 16px;
            padding: 12px 15px;
            color: #880E4F;
            border: 1px solid rgba(174, 22, 83, 0.4);
            border-radius: 12px;
            width: 85%;
            margin: 0 auto;
            box-sizing: border-box;
            background-color: #FFF5F7;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;       
            border-color: #EC407A;
            box-shadow: 0 0 0 4px rgba(236, 64, 122, 0.15);
            background-color: #fff;
        }
        button {
            background-color: #EC407A;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 85%;
            margin: 10px auto;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(236, 64, 122, 0.2);
        }
        button:hover { background-color: #ae1653; transform: translateY(-2px); }
        .link-footer { font-size: 16px; margin-top: 5px; }
        .link-footer a { color: #EC407A; text-decoration: none; font-weight: bold; transition: color 0.2s ease;}
        .link-footer a:hover { color: #ae1653; text-decoration: underline; }
        #messaggio { font-size: 16px; font-weight: bold; margin-top: 10px; min-height: 20px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Registrati</h1>
        <input type="text" id="nome" placeholder="Nome">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        
        <button onclick="registrati()">Registrati</button>

        <p class="link-footer">
            Sei già registrato? <a href="login.html">Accedi qui</a>
        </p>
        <p id="messaggio"></p>
    </div>

    <script>
        async function registrati(){
            const nome = document.getElementById("nome").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const res = await fetch("https://my-happy-capybara.onrender.com/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nome, email, password })
                });

                const data = await res.json();
                document.getElementById("messaggio").textContent = data.messaggio;

                if (res.ok) {
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);
                }
            } catch (error) {
                document.getElementById("messaggio").textContent = "Errore di connessione al server.";
            }
        }
    </script>
</body>
</html>
