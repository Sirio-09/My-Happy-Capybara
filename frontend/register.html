<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - My Happy Capybara</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            background: linear-gradient(135deg, #FFF5F7 0%, #FFE4EC 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #880E4F;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
 
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(136, 14, 79, 0.15);
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease-out;
        }
 
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 0.5px;
        }
 
        .subtitle {
            text-align: center;
            color: #ae1653;
            font-size: 14px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
 
        .form-group {
            margin-bottom: 20px;
        }
 
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #880E4F;
        }
 
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #FFB6D9;
            border-radius: 12px;
            background-color: #FFF5F7;
            color: #880E4F;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
        }
 
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #EC407A;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(236, 64, 122, 0.1);
        }
 
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #EC407A 0%, #ae1653 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(236, 64, 122, 0.3);
            margin-top: 10px;
        }
 
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(236, 64, 122, 0.4);
        }
 
        button:active {
            transform: translateY(-1px);
        }
 
        .link-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
 
        .link-footer a {
            color: #EC407A;
            text-decoration: none;
            font-weight: 700;
        }
 
        .link-footer a:hover {
            color: #ae1653;
            text-decoration: underline;
        }
 
        #messaggio {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            display: none;
        }
 
        #messaggio.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }
 
        #messaggio.success {
            background-color: #E8F5E9;
            color: #2E7D32;
            border-left: 4px solid #4CAF50;
        }
 
        #messaggio.error {
            background-color: #FFEBEE;
            color: #C62828;
            border-left: 4px solid #F44336;
        }
 
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
 
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
 
            h1 {
                font-size: 26px;
            }
 
            input {
                padding: 12px 14px;
                font-size: 16px;
            }
 
            button {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registrati</h1>
        <p class="subtitle">Crea il tuo account</p>
 
        <form onsubmit="registrati(event)">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Il tuo nome" required>
            </div>
 
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tua@email.com" required>
            </div>
 
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
 
            <button type="submit">Registrati</button>
        </form>
 
        <p class="link-footer">
            Sei già registrato? <a href="login.html">Accedi qui</a>
        </p>
        <div id="messaggio"></div>
    </div>
 
    <script>
        async function registrati(event){
            event.preventDefault();
            
            const nome = document.getElementById("nome").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const messaggioEl = document.getElementById("messaggio");
 
            if(!nome || !email || !password) {
                messaggioEl.textContent = "Compila tutti i campi";
                messaggioEl.className = "show error";
                return;
            }
 
            try {
                const res = await fetch("https://my-happy-capybara.onrender.com/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nome, email, password })
                });
 
                const data = await res.json();
                messaggioEl.textContent = data.messaggio;
                messaggioEl.className = "show " + (res.ok ? "success" : "error");
 
                if (res.ok) {
                    setTimeout(() => {
                        window.location.href = `verify.html?email=${encodeURIComponent(email)}`;
                    }, 2000);
                }
            } catch (error) {
                messaggioEl.textContent = "Errore di connessione al server";
                messaggioEl.className = "show error";
            }
        }
    </script>
</body>
</html>
