<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripristina Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFF5F7;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #880E4F;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(136, 14, 79, 0.15);
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            color: #ae1653;
            font-size: 14px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #880E4F;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #FFB6D9;
            border-radius: 12px;
            background-color: #FFF5F7;
            color: #880E4F;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #EC407A;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(236, 64, 122, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: #EC407A;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(236, 64, 122, 0.3);
            margin-top: 10px;
        }

        button:hover {
            background-color: #ae1653;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(236, 64, 122, 0.4);
        }

        .link-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .link-footer a {
            color: #EC407A;
            text-decoration: none;
            font-weight: 700;
        }

        .link-footer a:hover {
            color: #ae1653;
            text-decoration: underline;
        }

        #messaggio {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        #messaggio.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        #messaggio.success {
            background-color: #E8F5E9;
            color: #2E7D32;
            border-left: 4px solid #4CAF50;
        }

        #messaggio.error {
            background-color: #FFEBEE;
            color: #C62828;
            border-left: 4px solid #F44336;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 26px;
            }

            input {
                padding: 12px 14px;
                font-size: 16px;
            }

            button {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ripristina Password</h1>
        <p class="subtitle">Recupera l'accesso al tuo account</p>

        <!-- STEP 1: Inserisci email -->
        <div id="step1" class="step active">
            <form onsubmit="step1Submit(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tua@email.com" required>
                </div>
                <button type="submit">Continua</button>
            </form>
        </div>

        <!-- STEP 2: Inserisci codice e nuova password -->
        <div id="step2" class="step">
            <form onsubmit="step2Submit(event)">
                <div class="form-group">
                    <label for="codice">Codice di Verifica</label>
                    <input type="text" id="codice" placeholder="000000" maxlength="6" required>
                </div>

                <div class="form-group">
                    <label for="nuovaPassword">Nuova Password</label>
                    <input type="password" id="nuovaPassword" placeholder="Nuova password" required>
                </div>

                <button type="submit">Ripristina Password</button>
            </form>
        </div>

        <p class="link-footer">
            Ricordi la password? <a href="login.html">Accedi qui</a>
        </p>
        <div id="messaggio"></div>
    </div>

    <script>
        const emailInput = document.getElementById("email");

        async function step1Submit(event) {
            event.preventDefault();
            const email = emailInput.value.trim();
            const messaggioEl = document.getElementById("messaggio");

            try {
                const res = await fetch("https://my-happy-capybara.onrender.com/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                messaggioEl.textContent = data.messaggio;
                messaggioEl.className = "show " + (res.ok ? "success" : "error");

                if(res.ok) {
                    setTimeout(() => {
                        document.getElementById("step1").classList.remove("active");
                        document.getElementById("step2").classList.add("active");
                    }, 1500);
                }
            } catch(error) {
                messaggioEl.textContent = "Errore di connessione al server";
                messaggioEl.className = "show error";
            }
        }

        async function step2Submit(event) {
            event.preventDefault();
            const email = emailInput.value;
            const codice = document.getElementById("codice").value.trim();
            const nuovaPassword = document.getElementById("nuovaPassword").value;
            const messaggioEl = document.getElementById("messaggio");

            if(!codice || codice.length !== 6 || isNaN(codice)) {
                messaggioEl.textContent = "Inserisci un codice valido (6 cifre)";
                messaggioEl.className = "show error";
                return;
            }

            try {
                const res = await fetch("https://my-happy-capybara.onrender.com/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, codice, nuovaPassword })
                });

                const data = await res.json();
                messaggioEl.textContent = data.messaggio;
                messaggioEl.className = "show " + (res.ok ? "success" : "error");

                if(res.ok) {
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                }
            } catch(error) {
                messaggioEl.textContent = "Errore di connessione al server";
                messaggioEl.className = "show error";
            }
        }
    </script>
</body>
</html>
